name: 自动解密视频地址

# 触发条件：允许在 Actions 页面手动点击 "Run workflow" 按钮运行
on:
  workflow_dispatch:

jobs:
  run-decryption:
    runs-on: ubuntu-latest # 使用 GitHub 提供的免费 Ubuntu 服务器

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 指定 Python 3.10 版本

      - name: 安装所有必须的依赖包
        run: |
          python -m pip install --upgrade pip
          # 先安装 cffi 底层依赖，再安装 xxtea-py
          pip install cffi xxtea-py

      - name: 运行解密脚本
        run: python script.py
